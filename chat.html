<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Porxu Camper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5C000;
  --yellow2: #e6b000;
  --black: #111;
  --dark: #1a1a1a;
  --dark2: #222;
  --white: #fff;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
}

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
  background: rgba(17,17,17,0.98);
  border-bottom: 1px solid rgba(245,192,0,0.15);
  flex-shrink: 0;
}
.nav-brand {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 900;
  letter-spacing: 2px; color: var(--white);
  text-decoration: none;
}
.nav-brand span { color: var(--yellow); }
.nav-badge {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-display);
  font-size: 12px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.badge-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #00c47a;
  box-shadow: 0 0 6px #00c47a;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.nav-back {
  font-family: var(--font-display); font-size: 13px;
  font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4); text-decoration: none;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--yellow); }

/* CHAT CONTAINER */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
  padding: 0 16px;
  overflow: hidden;
}

/* INTRO */
.chat-intro {
  padding: 32px 0 24px;
  text-align: center;
  flex-shrink: 0;
}
.intro-icon {
  width: 64px; height: 64px;
  background: rgba(245,192,0,0.1);
  border: 1px solid rgba(245,192,0,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 16px;
}
.intro-title {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 8px;
}
.intro-sub {
  font-family: var(--font-body);
  font-size: 15px; color: rgba(255,255,255,0.45);
  max-width: 440px; margin: 0 auto 24px;
  line-height: 1.5;
}

/* SUGERENCIAS */
.sugerencias {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-bottom: 8px;
}
.sug-btn {
  font-family: var(--font-body); font-size: 13px;
  color: rgba(255,255,255,0.65);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 8px 16px;
  cursor: pointer; transition: all 0.2s;
}
.sug-btn:hover {
  border-color: var(--yellow);
  color: var(--yellow);
  background: rgba(245,192,0,0.06);
}

/* MENSAJES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: rgba(245,192,0,0.3); border-radius: 2px; }

.msg {
  display: flex;
  gap: 12px;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; margin-top: 2px;
}
.msg.bot .msg-avatar {
  background: rgba(245,192,0,0.15);
  border: 1px solid rgba(245,192,0,0.25);
}
.msg.user .msg-avatar {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
}

.msg-bubble {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 12px;
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
}
.msg.bot .msg-bubble {
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.07);
  border-bottom-left-radius: 4px;
  color: rgba(255,255,255,0.85);
}
.msg.user .msg-bubble {
  background: var(--yellow);
  color: var(--black);
  font-weight: 500;
  border-bottom-right-radius: 4px;
}

/* TYPING */
.typing-indicator {
  display: flex; gap: 4px; align-items: center;
  padding: 14px 16px;
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* INPUT */
.input-area {
  flex-shrink: 0;
  padding: 16px 0 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.input-row {
  display: flex; gap: 10px; align-items: flex-end;
}
.input-box {
  flex: 1;
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 16px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--white);
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 120px;
  transition: border-color 0.2s;
  line-height: 1.5;
}
.input-box::placeholder { color: rgba(255,255,255,0.25); }
.input-box:focus { border-color: rgba(245,192,0,0.4); }

.send-btn {
  width: 48px; height: 48px;
  background: var(--yellow);
  border: none; border-radius: 12px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.send-btn:hover { background: var(--yellow2); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.send-btn svg { width: 20px; height: 20px; }

.input-hint {
  font-family: var(--font-body);
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  text-align: center;
  margin-top: 8px;
}

/* WA FOOTER */
.wa-footer {
  flex-shrink: 0;
  text-align: center;
  padding: 0 0 16px;
}
.wa-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-display); font-size: 13px;
  font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(255,255,255,0.3); text-decoration: none;
  transition: color 0.2s;
}
.wa-link:hover { color: #25D366; }

@media (max-width: 600px) {
  nav { padding: 0 16px; }
  .msg-bubble { max-width: 88%; font-size: 14px; }
  .intro-title { font-size: 22px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">PORXU <span>CAMPER</span></a>
  <div class="nav-badge">
    <div class="badge-dot"></div>
    Asistente online
  </div>
  <a href="index.html" class="nav-back">← Volver</a>
</nav>

<div class="chat-container">

  <div class="chat-intro" id="chatIntro">
    <div class="intro-icon">🏕️</div>
    <h1 class="intro-title">Hola, soy <span style="color:var(--yellow)">Porxu</span></h1>
    <p class="intro-sub">Tu asistente de Porxu Camper. Pregúntame lo que quieras sobre los modelos, precios, instalación o lo que necesites.</p>
    <div class="sugerencias">
      <button class="sug-btn" onclick="sendSuggestion(this)">¿Qué modelos tienen?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">¿Cómo se instala el VUmax?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">¿Funciona en el altiplano?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">¿Cuánto tarda la fabricación?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">¿Cuál es el modelo estrella?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">¿Tienen garantía?</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        class="input-box"
        id="inputBox"
        placeholder="Escribe tu pregunta aquí..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="input-hint">Powered by Claude AI · Porxu Camper Bolivia</p>
  </div>

  <div class="wa-footer">
    <a href="https://wa.me/59175997125" target="_blank" class="wa-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.855L.057 23.886a.5.5 0 00.606.61l6.162-1.457A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.8 9.8 0 01-5.001-1.368l-.36-.214-3.716.878.938-3.617-.234-.373A9.778 9.778 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182c5.43 0 9.818 4.388 9.818 9.818 0 5.43-4.388 9.818-9.818 9.818z"/></svg>
      ¿Prefieres hablar con una persona? WhatsApp
    </a>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `Eres el asistente virtual de Porxu Camper, una empresa boliviana que fabrica campers artesanales en Cochabamba, Bolivia. Tu nombre es "Porxu".

SOBRE LA EMPRESA:
- Fabrican campers artesanales en Cochabamba, Bolivia
- Cada camper se construye a mano, una por una
- Diseñadas para altiplano, montaña, selva y ripio boliviano
- Contacto: WhatsApp +591 75997125 y +591 72776946
- Email: porxucamper@gmail.com
- Web: porxu.com

MODELOS DISPONIBLES:

1. VIGO (Minicamper - EL MODELO ESTRELLA)
- Tipo: Mini remolque liviano
- Ideal para: explorar rutas difíciles, off-road, aventureros solos o en pareja
- Características: liviano, compacto, muy maniobrable
- Puede ir a donde los remolques grandes no llegan
- Es el producto más popular de Porxu Camper

2. VU (Módulo pickup - versión compacta)
- Tipo: Módulo que se monta sobre la caja de la pickup
- Versión más corta, cierra la puerta trasera de la camioneta
- Ideal para: uso diario y aventuras de fin de semana
- Equipamiento: panel solar, batería GEL, cama, cocina
- Compatible con: Toyota Hilux, Ford Ranger, Nissan Navara, Mitsubishi L200 y similares

3. VUMAX (Módulo pickup - cabina completa)
- Tipo: Módulo completo sobre la caja de la pickup
- El más equipado de la línea pickup
- Equipamiento completo: 300W solar, batería 100Ah GEL, calefón a gas, ducha, 70L agua, cama, cocina
- Autonomía total: no necesita campings ni servicios externos
- Compatible con: Toyota Hilux, Ford Ranger, Nissan Navara, Mitsubishi L200 y similares
- Tiene manual técnico disponible en la web

4. P8 (Casa rodante - PRÓXIMAMENTE)
- Tipo: Remolque casa rodante
- Pensado para viajes largos y familias
- Todos los equipos del VUmax en formato más espacioso
- Aún en desarrollo, próximo lanzamiento

PREGUNTAS FRECUENTES:
- Tiempo de fabricación: entre 6 y 12 semanas según modelo y demanda
- Garantía: sí, en estructura y sistemas, detalles por escrito al entregar
- Personalización: sí, al ser artesanal se puede adaptar todo
- Altiplano/altura: todos los sistemas probados hasta más de 4.000 msnm
- Taller: Cochabamba, Bolivia. Pueden coordinar entregas en otras ciudades

INSTRUCCIONES:
- Responde siempre en español
- Sé amable, directo y entusiasta sobre los productos
- Si preguntan precio, di que deben contactar por WhatsApp para un presupuesto personalizado
- Si no sabes algo específico, recomienda contactar por WhatsApp
- Respuestas cortas y claras, máximo 3-4 párrafos
- Usa emojis con moderación (1-2 por respuesta máximo)
- Siempre que sea relevante menciona el WhatsApp: +591 75997125`;

let conversacion = [];
let enviando = false;

async function sendMessage(texto) {
  const input = document.getElementById('inputBox');
  const msg = texto || input.value.trim();
  if (!msg || enviando) return;

  // Ocultar intro
  const intro = document.getElementById('chatIntro');
  if (intro) intro.style.display = 'none';

  // Limpiar input
  if (!texto) {
    input.value = '';
    input.style.height = 'auto';
  }

  // Mostrar mensaje usuario
  addMessage('user', msg);
  conversacion.push({ role: 'user', content: msg });

  // Deshabilitar input
  enviando = true;
  document.getElementById('sendBtn').disabled = true;
  input.disabled = true;

  // Mostrar typing
  const typingId = showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversacion
      })
    });

    const data = await response.json();
    removeTyping(typingId);

    if (data.content && data.content[0]) {
      const respuesta = data.content[0].text;
      addMessage('bot', respuesta);
      conversacion.push({ role: 'assistant', content: respuesta });
    } else {
      addMessage('bot', 'Disculpa, hubo un problema. Por favor escríbenos directamente al WhatsApp +591 75997125 🙏');
    }
  } catch (err) {
    removeTyping(typingId);
    addMessage('bot', 'No pude conectarme en este momento. Puedes escribirnos directamente al WhatsApp +591 75997125 📱');
  }

  enviando = false;
  document.getElementById('sendBtn').disabled = false;
  input.disabled = false;
  input.focus();
}

function sendSuggestion(btn) {
  sendMessage(btn.textContent);
}

function addMessage(role, text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = role === 'bot' ? '🏕️' : '👤';
  
  // Formatear texto: saltos de línea y negritas básicas
  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${formatted}</div>
  `;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const id = 'typing-' + Date.now();
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">🏕️</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>

</body>
</html>
